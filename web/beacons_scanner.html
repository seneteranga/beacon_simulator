<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeneTeranga</title>
    <style>
        /* Reset some default styles */

        .text-red {
            color: red;
        }

        .text-warning {
            color: yellow;
        }

        .text-success {
            color: limegreen;
        }

        text * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            background-color: #f4f4f4;
            color: #333;
        }

        /* Navigation Bar */

        nav {
            background: #333;
            color: #fff;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            margin: 0 10px;
        }

        nav a:hover {
            text-decoration: underline;
        }

        /* Hero Section */

        .hero {
            background: url('./back.jpg') no-repeat center center/cover;
            color: white;
            height: 200px;
            /* height: 400px; */
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .beacon {
            background-color: red;
            height: 20px;
            margin-bottom: 10px;
            text-align: center;
            align-content: center;
            font-size: 12px;
            color: white;
        }

        .visualization {
            min-width: 200px;
            margin-bottom: 10;
        }

        .hero h1 {
            font-size: 3rem;
            background: rgba(0, 0, 0, 0.5);
            padding: 20px;
            border-radius: 5px;
        }

        /* Main Content */

        .datas-spaces {
            color: white;
            font-family: 'Courier New', Courier, monospace;
            background-color: #333;
        }

        .container {
            max-width: 1100px;
            /* height: 50vh; */
            margin: auto;
            padding: 20px;
            background: white;
        }

        /* Footer */

        footer {
            background: #333;
            color: white;
            text-align: center;
            padding: 10px;
            margin-top: 20px;
        }

        /* Responsive Design */

        @media (max-width: 768px) {
            .hero h1 {
                font-size: 2rem;
            }

            nav {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>

    <!-- Navigation -->
    <nav>
        <div class="logo">SeneTeranga</div>
        <div>
            <a href="#">Accueil</a>
            <a href="#">A propos</a>
            <a href="#">Services</a>
            <a href="#">Contact</a>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero">
        <h1 class="text-success">Beacon Simulator</h1>
    </section>

    <!-- <section class="hero">
        <video id="mycamm" width="500" height="200" autoplay></video>
    </section> -->
    <main class="container">
        <h2>A propos</h2>
        <p>
            ceci est un simple page web pour visualiser notre Simulateur de beacons
        </p>
        <hr>

        <p>
            <b>Statut: </b> <span id="status"></span>
        </p>
        <p>
            <b>Données: </b>
        </p>
        <p id="donnees" class="datas-spaces">

        </p>
        <hr>
        <h1>visualization</h1>
        <div class="visualization">
            <div class="beacon">

            </div>
        </div>
    </main>
    <section class="content">

    </section>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 SeneTeranga. All rights reserved.</p>
    </footer>
    <script>
        // navigator.mediaDevices.getUserMedia({ video: true }).then(
        //     function (stream) {
        //         var video = document.querySelector("#mycamm")
        //         video.srcObject = stream
        //     }
        // ).catch(
        //     function (erreur) {
        //         console.log(erreur)
        //     }
        // )

        var server_statut = document.querySelector("#status")
        var vues = document.querySelector(".visualization")
        const host = window.location.hostname
        const serveur_ble = new WebSocket("ws://" + host + ":5200")
        var datas = document.querySelector("#donnees")
        function showDatas(datas) {
            datas.forEach((element, i) => {
                let new_child = document.createElement('div')
                new_child.classList.add("beacon")
                new_child.style.width = (400 + (element["rssi"]) * 2) + "px"
                new_child.textContent = "Beacon N°" + element["id"] + "  " + element["rssi"] + "/" + element["rssi"]
                vues.appendChild(new_child)
            });
        }
        serveur_ble.onopen = () => {
            server_statut.textContent = " Connexion etablie !"
            server_statut.classList.add("text-success")
        }
        serveur_ble.onmessage = (event) => {
            vues.replaceChildren()
            let data = JSON.parse(event.data) // data.sort((a, b) => a["rssi"] - b["rssi"])
            showDatas(data)
            datas.replaceChildren()
            data.forEach((element, i) => {
                beacon = document.createElement('dt')
                beacon_rssi = document.createElement('dd')
                beacon_rssi.innerHTML = "<b>Beacon N°" + element["id"] + "(" + element["major"] + ":" + element["minor"] + "): </b> " + element["rssi"] + "/" + element["txpower"]
                beacons = document.createElement('dl')
                beacons.appendChild(beacon)
                beacons.appendChild(beacon_rssi)
                datas.appendChild(beacons)
            });
        }
        serveur_ble.onerror = (erreur) => {
            server_statut.textContent = "Une erreur est survenue !"
            server_statut.classList.add("text-red")
            server_statut.classList.remove("text-success")
            console.log(erreur)
        }
        serveur_ble.onclose = () => {
            server_statut.textContent = "Connexion terminé !"
            server_statut.classList.add("text-red")
            server_statut.classList.remove("text-success")
        }


    </script>

</body>

</html>
